name: Publish release assets

on:
  push:
    branches:
      - main
    paths:
      - APP_VERSION
      - x64/Release/**
      - Fluffy-FiveM.exe
      - "*.dll"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release tag from APP_VERSION
        id: ver
        run: |
          VER="$(tr -d ' \r\n\t' < APP_VERSION)"
          if [ -z "$VER" ]; then
            echo "::error::APP_VERSION is empty"
            exit 1
          fi
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --title "$TAG" --notes "Auto-published assets for $TAG."
          fi

      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          upload_if_exists() {
            if [ -f "$1" ]; then
              echo "Uploading $1"
              gh release upload "$TAG" "$1" --clobber
            fi
          }

          upload_if_exists "x64/Release/Fluffy-FiveM.exe"
          upload_if_exists "x64/Release/fluffyFiveM.exe"
          upload_if_exists "Fluffy-FiveM.exe"
          upload_if_exists "fluffyFiveM.exe"

          upload_if_exists "x64/Release/D3DCompiler_43.dll"
          upload_if_exists "x64/Release/d3dx9_43.dll"
          upload_if_exists "x64/Release/d3dx11_43.dll"
          upload_if_exists "x64/Release/d3dx10_43.dll"
          upload_if_exists "D3DCompiler_43.dll"
          upload_if_exists "d3dx9_43.dll"
          upload_if_exists "d3dx11_43.dll"
          upload_if_exists "d3dx10_43.dll"

      - name: Build and upload update.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"

          EXE_PATH=""
          if [ -f "x64/Release/Fluffy-FiveM.exe" ]; then EXE_PATH="x64/Release/Fluffy-FiveM.exe"; fi
          if [ -z "$EXE_PATH" ] && [ -f "x64/Release/fluffyFiveM.exe" ]; then EXE_PATH="x64/Release/fluffyFiveM.exe"; fi
          if [ -z "$EXE_PATH" ] && [ -f "Fluffy-FiveM.exe" ]; then EXE_PATH="Fluffy-FiveM.exe"; fi
          if [ -z "$EXE_PATH" ] && [ -f "fluffyFiveM.exe" ]; then EXE_PATH="fluffyFiveM.exe"; fi
          if [ -z "$EXE_PATH" ]; then
            echo "::error::No executable found to package update.zip"
            exit 1
          fi

          rm -f update.zip
          zip -j update.zip "$EXE_PATH" \
            x64/Release/D3DCompiler_43.dll x64/Release/d3dx9_43.dll x64/Release/d3dx11_43.dll x64/Release/d3dx10_43.dll \
            D3DCompiler_43.dll d3dx9_43.dll d3dx11_43.dll d3dx10_43.dll \
            2>/dev/null || true

          if [ ! -f update.zip ]; then
            echo "::error::Failed to create update.zip"
            exit 1
          fi

          gh release upload "$TAG" update.zip --clobber
