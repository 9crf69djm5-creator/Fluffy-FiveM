# On push to main: upload exe to the release v{APP_VERSION} (root file APP_VERSION).
# Creates that release if it doesn't exist — so v1.6.0 becomes Latest instead of staying on v1.4.
name: Update latest release

on:
  push:
    branches:
      - main
    paths:
      - 'x64/Release/fluffyFiveM.exe'
      - 'x64/Release/*.dll'

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release tag from APP_VERSION
        id: ver
        run: |
          VER=$(tr -d ' \r\n\t' < APP_VERSION)
          if [ -z "$VER" ]; then
            echo "::error::APP_VERSION file missing or empty"
            exit 1
          fi
          echo "App version: $VER → release tag v$VER"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=v$VER" >> $GITHUB_OUTPUT

      - name: Create release if missing
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" 2>/dev/null; then
            echo "Release $TAG already exists."
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" --title "$TAG" --notes "Build **$TAG** — version from \`APP_VERSION\`. Keep it in sync with \`FLUFFY_APP_VERSION_STRING\` in your local \`src/Globals.hpp\`."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload exe and DLLs
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          cd x64/Release
          gh release upload "$TAG" fluffyFiveM.exe --clobber
          for f in D3DCompiler_43.dll d3dx9_43.dll d3dx11_43.dll d3dx10_43.dll; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
